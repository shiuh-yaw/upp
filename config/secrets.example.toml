# UPP Gateway — Secrets Configuration Template
#
# THIS FILE IS A TEMPLATE ONLY
# NEVER commit actual secrets to version control!
#
# Usage:
# 1. Copy this file to config/secrets.toml (or use environment variables)
# 2. Fill in actual secret values
# 3. Ensure config/secrets.toml is in .gitignore
#
# For production:
# - Use environment variables (UPP_*) instead of files
# - Use secrets management tools (AWS Secrets Manager, HashiCorp Vault, etc.)
# - Never store unencrypted secrets in repositories

# ─── Provider API Keys ─────────────────────────────────────────

# Kalshi — API key for market data and trading
# Get from: https://kalshi.com/api/settings
kalshi_api_key_id = "your-actual-kalshi-api-key-here"

# Kalshi — Path to private key file (PEM format)
# This key is used for signing API requests
kalshi_private_key_path = "/etc/upp/secrets/kalshi-private.pem"

# Polymarket — Ethereum wallet private key
# Used for signing transactions on Polygon (Polymarket's chain)
# CRITICAL: Keep this secure! This key controls real assets.
polymarket_wallet_key = "your-actual-polymarket-wallet-key-here"

# Opinion Exchange — API key
# Get from: https://opinionexchange.com/api/settings
opinion_api_key = "your-actual-opinion-api-key-here"

# ─── Authentication & Authorization ───────────────────────────

# JWT Secret — Used to sign and verify JSON Web Tokens
# Generate a strong random value:
#   openssl rand -base64 32
#
# CRITICAL: Change this in production!
jwt_secret = "your-actual-jwt-secret-key-here"

# ─── TLS/SSL Certificates ─────────────────────────────────────

# Path to TLS certificate (PEM format)
# Example: /etc/upp/certs/tls.crt
tls_cert_path = "/etc/upp/certs/tls.crt"

# Path to TLS private key (PEM format)
# Example: /etc/upp/certs/tls.key
# CRITICAL: Protect this file with restricted permissions (0400 or 0600)
tls_key_path = "/etc/upp/certs/tls.key"

# ─── Redis Configuration ───────────────────────────────────────

# Redis URL — For distributed state sharing
# Format: redis://[user:password@]host:port[/db]
#
# Examples:
#   redis://localhost:6379                          (local, no auth)
#   redis://myuser:mypass@redis.example.com:6379    (remote, with auth)
#   rediss://user:pass@redis.example.com:6380       (TLS encrypted)
#
# For production: Always use TLS (rediss://) with managed Redis
redis_url = "redis://localhost:6379"

# ─── Security Notes ───────────────────────────────────────────

# 1. File Permissions:
#    - chmod 600 config/secrets.toml (read/write owner only)
#    - chmod 600 /etc/upp/certs/tls.key (TLS key files)
#
# 2. Environment Variables:
#    - Prefer env vars over files in production
#    - Example: UPP_JWT_SECRET=actual-secret
#
# 3. Rotation:
#    - API keys: Rotate quarterly or when employees leave
#    - JWT secret: Can be rotated transparently (tokens remain valid)
#    - TLS certificates: Renew before expiration (use Let's Encrypt for automation)
#
# 4. Backups:
#    - Never backup unencrypted secrets
#    - Use encrypted backup solutions (e.g., AWS Secrets Manager backups)
#
# 5. Access Control:
#    - Limit read access to this file to the gateway process user
#    - Use SELinux or AppArmor for additional protection
#    - Monitor access via audit logs
