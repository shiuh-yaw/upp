<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPP Gateway API - Swagger UI</title>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@4/swagger-ui.css">
    <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@4/favicon-32x32.png" sizes="32x32">
    <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@4/favicon-16x16.png" sizes="16x16">
    <style>
        html {
            box-sizing: border-box;
            overflow: -moz-scrollbars-vertical;
            overflow-y: scroll;
        }
        *, *:before, *:after {
            box-sizing: inherit;
        }
        body {
            margin: 0;
            padding: 0;
            background: #fafafa;
        }
        .topbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .topbar-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 40px;
        }
        .topbar h1 {
            margin: 0;
            color: white;
            font-size: 24px;
            font-weight: 600;
        }
        .topbar p {
            margin: 8px 0 0 0;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }
        .swagger-ui .model-container {
            background-color: #f5f5f5;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-inner">
            <div>
                <h1>UPP Gateway API</h1>
                <p>Universal Prediction Protocol - Unified Access to Prediction Markets</p>
            </div>
        </div>
    </div>
    <div id="swagger-ui"></div>

    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@4/swagger-ui-bundle.js" charset="UTF-8"></script>
    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@4/swagger-ui-standalone-preset.js" charset="UTF-8"></script>
    <script>
        window.onload = function() {
            // Determine the URL for the OpenAPI spec
            const baseUrl = window.location.origin + window.location.pathname;
            const specUrl = baseUrl.replace('swagger.html', '') + 'openapi.yaml';

            const SwaggerUIBundle = window.SwaggerUIBundle;
            const ui = SwaggerUIBundle({
                url: specUrl,
                dom_id: '#swagger-ui',
                deepLinking: true,
                presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIStandalonePreset
                ],
                plugins: [
                    SwaggerUIBundle.plugins.DownloadUrl
                ],
                layout: "StandaloneLayout",
                defaultModelsExpandDepth: 1,
                defaultModelExpandDepth: 1,
                tryItOutEnabled: true,
                showRequestHeaders: true,
                queryConfigEnabled: true,
                onFailure: function(error) {
                    console.error('Failed to load OpenAPI spec:', error);
                    document.getElementById('swagger-ui').innerHTML = '<div style="padding: 20px; color: #d32f2f;"><strong>Error loading OpenAPI specification</strong><p>Failed to load ' + specUrl + '</p><p>Make sure the openapi.yaml file exists in the same directory as this file.</p></div>';
                }
            });

            window.ui = ui;
        };
    </script>
</body>
</html>
