openapi: 3.1.0

info:
  title: UPP Gateway API
  version: 0.1.0
  description: |
    Universal Prediction Protocol Gateway API provides unified access to prediction markets across multiple providers via a single API.

    ## Authentication

    The API uses two authentication methods:
    - **ApiKeyAuth**: X-API-Key header for API key-based authentication
    - **BearerAuth**: Bearer token in Authorization header for JWT-based authentication

    Protected endpoints require authentication. Public endpoints are rate-limited but do not require credentials.

    ## Rate Limiting

    All endpoints are rate-limited. Rate limit information is returned in response headers:
    - `X-RateLimit-Limit`: Maximum requests per minute
    - `X-RateLimit-Remaining`: Remaining requests in current window
    - `Retry-After`: Seconds to wait before retrying (on 429 responses)

  contact:
    name: UPP Team
    url: https://github.com/upp-labs
    email: support@upp.dev
  license:
    name: Apache-2.0
    url: https://opensource.org/licenses/Apache-2.0

servers:
  - url: http://localhost:8080
    description: Local development server
  - url: http://gateway:8080
    description: Docker containerized gateway
  - url: https://api.upp.dev
    description: Production server

tags:
  - name: Health
    description: Service health and readiness checks
  - name: Markets
    description: Market data and discovery
  - name: Orderbook
    description: Order book data and management
  - name: Arbitrage
    description: Arbitrage opportunity detection and analytics
  - name: Candles
    description: Candlestick data and price history
  - name: Price Index
    description: Price index statistics and aggregates
  - name: Discovery
    description: Market provider discovery and negotiation
  - name: Resolution
    description: Market resolution and settlement
  - name: Settlement
    description: Settlement instrument management
  - name: Backtest
    description: Strategy backtesting and comparison
  - name: Feeds
    description: Live data feed status and management
  - name: Orders
    description: Order management and execution (Protected)
  - name: Trades
    description: Trade history and execution details (Protected)
  - name: Portfolio
    description: Portfolio management and analytics (Protected)
  - name: Smart Routing
    description: Smart order routing and execution (Protected)
  - name: Auth Management
    description: API key management (Protected)
  - name: MCP
    description: Model Context Protocol integration
  - name: Ingestion
    description: Historical data ingestion
  - name: WebSocket
    description: WebSocket streaming connections
  - name: Dashboard
    description: Dashboard and UI

paths:
  # ============================================================================
  # HEALTH & STATUS
  # ============================================================================
  /health:
    get:
      operationId: getHealth
      summary: Health check
      description: Returns 200 if the service is running and healthy
      tags: [Health]
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '500':
          description: Service is unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ready:
    get:
      operationId: getReady
      summary: Readiness check
      description: Returns 200 if the service is ready to handle requests
      tags: [Health]
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
        '503':
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /metrics:
    get:
      operationId: getMetrics
      summary: Prometheus metrics
      description: Returns metrics in Prometheus format
      tags: [Health]
      responses:
        '200':
          description: Metrics in Prometheus text format
          content:
            text/plain:
              schema:
                type: string

  # ============================================================================
  # DISCOVERY
  # ============================================================================
  /.well-known/upp:
    get:
      operationId: getWellKnown
      summary: UPP well-known configuration
      description: Returns well-known configuration for UPP discovery
      tags: [Discovery]
      responses:
        '200':
          description: Well-known configuration
          content:
            application/json:
              schema:
                type: object
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /upp/v1/discovery/manifest/{provider}:
    get:
      operationId: getDiscoveryManifest
      summary: Get provider manifest
      description: Get the manifest for a specific prediction market provider
      tags: [Discovery]
      parameters:
        - name: provider
          in: path
          required: true
          description: Provider name (e.g., 'kalshi.com', 'polymarket.com')
          schema:
            type: string
      responses:
        '200':
          description: Provider manifest
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Invalid provider name
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Provider not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /upp/v1/discovery/providers:
    get:
      operationId: listDiscoveryProviders
      summary: List available providers
      description: List all connected prediction market providers
      tags: [Discovery]
      responses:
        '200':
          description: List of providers
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      type: string

  /upp/v1/discovery/negotiate:
    post:
      operationId: discoverNegotiate
      summary: Provider negotiation
      description: Negotiate connection parameters with a provider
      tags: [Discovery]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                provider:
                  type: string
                  description: Provider name
                parameters:
                  type: object
                  description: Negotiation parameters
      responses:
        '200':
          description: Negotiation successful
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Invalid negotiation parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /upp/v1/discovery/health/{provider}:
    get:
      operationId: getDiscoveryHealthForProvider
      summary: Provider health check
      description: Check the health of a specific provider connection
      tags: [Discovery]
      parameters:
        - name: provider
          in: path
          required: true
          description: Provider name
          schema:
            type: string
      responses:
        '200':
          description: Provider is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  provider:
                    type: string
                  status:
                    type: string
        '503':
          description: Provider is unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /upp/v1/discovery/health:
    get:
      operationId: getDiscoveryHealthAll
      summary: All providers health check
      description: Check health of all connected providers
      tags: [Discovery]
      responses:
        '200':
          description: Health status of all providers
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      type: object

  # ============================================================================
  # MARKETS
  # ============================================================================
  /upp/v1/markets:
    get:
      operationId: listMarkets
      summary: List markets
      description: List all available prediction markets
      tags: [Markets]
      parameters:
        - name: provider
          in: query
          description: Filter by provider name
          schema:
            type: string
        - name: status
          in: query
          description: Filter by market status (open, closed, etc.)
          schema:
            type: string
        - name: category
          in: query
          description: Filter by market category
          schema:
            type: string
        - name: limit
          in: query
          description: Maximum number of results (default 50)
          schema:
            type: integer
            minimum: 1
            maximum: 1000
        - name: cursor
          in: query
          description: Pagination cursor
          schema:
            type: string
      responses:
        '200':
          description: List of markets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketsResponse'
        '400':
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /upp/v1/markets/search:
    get:
      operationId: searchMarkets
      summary: Search markets
      description: Search for markets by title or description
      tags: [Markets]
      parameters:
        - name: q
          in: query
          required: false
          description: Search query
          schema:
            type: string
        - name: provider
          in: query
          description: Filter by provider
          schema:
            type: string
        - name: category
          in: query
          description: Filter by category
          schema:
            type: string
        - name: limit
          in: query
          description: Maximum number of results
          schema:
            type: integer
            minimum: 1
            maximum: 1000
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400':
          description: Invalid search parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /upp/v1/markets/{marketId}:
    get:
      operationId: getMarket
      summary: Get market details
      description: Get detailed information about a specific market
      tags: [Markets]
      parameters:
        - name: marketId
          in: path
          required: true
          description: Market identifier
          schema:
            type: string
      responses:
        '200':
          description: Market details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketResponse'
        '404':
          description: Market not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /upp/v1/markets/{marketId}/orderbook:
    get:
      operationId: getOrderbook
      summary: Get market orderbook
      description: Get the current orderbook for a market
      tags: [Orderbook]
      parameters:
        - name: marketId
          in: path
          required: true
          description: Market identifier
          schema:
            type: string
      responses:
        '200':
          description: Market orderbook
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderbookResponse'
        '404':
          description: Market not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /upp/v1/markets/{marketId}/orderbook/merged:
    get:
      operationId: getMergedOrderbook
      summary: Get merged orderbook
      description: Get merged orderbook across all providers for a market
      tags: [Orderbook]
      parameters:
        - name: marketId
          in: path
          required: true
          description: Market identifier
          schema:
            type: string
      responses:
        '200':
          description: Merged orderbook
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderbookResponse'
        '404':
          description: Market not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /upp/v1/markets/categories:
    get:
      operationId: listCategories
      summary: List market categories
      description: List all available market categories
      tags: [Markets]
      responses:
        '200':
          description: List of categories
          content:
            application/json:
              schema:
                type: object
                properties:
                  categories:
                    type: array
                    items:
                      type: string

  # ============================================================================
  # ARBITRAGE
  # ============================================================================
  /upp/v1/arbitrage:
    get:
      operationId: listArbitrageOpportunities
      summary: List arbitrage opportunities
      description: Get list of current arbitrage opportunities across markets and providers
      tags: [Arbitrage]
      parameters:
        - name: min_profit
          in: query
          description: Filter opportunities by minimum profit percentage
          schema:
            type: number
            format: float
      responses:
        '200':
          description: Arbitrage opportunities
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArbitrageListResponse'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /upp/v1/arbitrage/summary:
    get:
      operationId: getArbitrageSummary
      summary: Arbitrage summary
      description: Get summary of arbitrage opportunities and recent activity
      tags: [Arbitrage]
      responses:
        '200':
          description: Arbitrage summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArbitrageSummaryResponse'

  /upp/v1/arbitrage/history:
    get:
      operationId: getArbitrageHistory
      summary: Arbitrage history
      description: Get historical arbitrage trades and opportunities
      tags: [Arbitrage]
      parameters:
        - name: limit
          in: query
          description: Maximum number of historical entries
          schema:
            type: integer
            minimum: 1
            maximum: 1000
      responses:
        '200':
          description: Arbitrage history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArbitrageHistoryResponse'

  # ============================================================================
  # PRICE HISTORY & CANDLES
  # ============================================================================
  /upp/v1/markets/{marketId}/candles:
    get:
      operationId: getCandles
      summary: Get candlestick data
      description: Get OHLCV candlestick data for a market outcome
      tags: [Candles]
      parameters:
        - name: marketId
          in: path
          required: true
          description: Market identifier
          schema:
            type: string
        - name: outcome_id
          in: query
          description: Outcome identifier (if not specified, returns all outcomes)
          schema:
            type: string
        - name: resolution
          in: query
          description: Candle resolution (1m, 5m, 15m, 1h, 4h, 1d)
          schema:
            type: string
            enum: [1m, 5m, 15m, 1h, 4h, 1d]
        - name: from
          in: query
          description: Start timestamp (ISO 8601)
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: End timestamp (ISO 8601)
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          description: Maximum number of candles
          schema:
            type: integer
            minimum: 1
            maximum: 5000
      responses:
        '200':
          description: Candlestick data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CandlesResponse'
        '400':
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Market not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /upp/v1/markets/{marketId}/candles/latest:
    get:
      operationId: getLatestCandle
      summary: Get latest candle
      description: Get the latest candlestick for a market outcome
      tags: [Candles]
      parameters:
        - name: marketId
          in: path
          required: true
          description: Market identifier
          schema:
            type: string
        - name: outcome_id
          in: query
          description: Outcome identifier
          schema:
            type: string
        - name: resolution
          in: query
          description: Candle resolution
          schema:
            type: string
            enum: [1m, 5m, 15m, 1h, 4h, 1d]
      responses:
        '200':
          description: Latest candle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LatestCandleResponse'
        '404':
          description: Market not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /upp/v1/price-index/stats:
    get:
      operationId: getPriceIndexStats
      summary: Get price index statistics
      description: Get aggregated price index statistics across all markets
      tags: [Price Index]
      parameters:
        - name: index_id
          in: query
          description: Specific index identifier
          schema:
            type: string
      responses:
        '200':
          description: Price index statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceIndexStatsResponse'

  # ============================================================================
  # RESOLUTION & SETTLEMENT
  # ============================================================================
  /upp/v1/resolutions/{marketId}:
    get:
      operationId: getResolution
      summary: Get market resolution
      description: Get resolution data for a specific market
      tags: [Resolution]
      parameters:
        - name: marketId
          in: path
          required: true
          description: Market identifier
          schema:
            type: string
      responses:
        '200':
          description: Resolution data
          content:
            application/json:
              schema:
                type: object
        '404':
          description: Market not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /upp/v1/resolutions:
    get:
      operationId: listResolutions
      summary: List resolutions
      description: List all available resolutions
      tags: [Resolution]
      parameters:
        - name: status
          in: query
          description: Filter by resolution status
          schema:
            type: string
      responses:
        '200':
          description: List of resolutions
          content:
            application/json:
              schema:
                type: object
                properties:
                  resolutions:
                    type: array
                    items:
                      type: object

  /upp/v1/settlement/instruments:
    get:
      operationId: listSettlementInstruments
      summary: List settlement instruments
      description: List all settlement instruments available
      tags: [Settlement]
      responses:
        '200':
          description: Settlement instruments
          content:
            application/json:
              schema:
                type: object
                properties:
                  instruments:
                    type: array
                    items:
                      type: object

  /upp/v1/settlement/handlers:
    get:
      operationId: listSettlementHandlers
      summary: List settlement handlers
      description: List all settlement handlers configured
      tags: [Settlement]
      responses:
        '200':
          description: Settlement handlers
          content:
            application/json:
              schema:
                type: object
                properties:
                  handlers:
                    type: array
                    items:
                      type: object

  # ============================================================================
  # BACKTEST
  # ============================================================================
  /upp/v1/backtest/strategies:
    get:
      operationId: listBacktestStrategies
      summary: List available strategies
      description: List all available backtesting strategies
      tags: [Backtest]
      responses:
        '200':
          description: Available strategies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StrategiesResponse'

  /upp/v1/backtest/run:
    post:
      operationId: runBacktest
      summary: Run backtest
      description: Execute a backtest of a strategy against historical market data
      tags: [Backtest]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunBacktestRequest'
      responses:
        '200':
          description: Backtest completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BacktestResponse'
        '400':
          description: Invalid backtest parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /upp/v1/backtest/compare:
    post:
      operationId: compareStrategies
      summary: Compare strategies
      description: Compare multiple strategies against the same market
      tags: [Backtest]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompareStrategiesRequest'
      responses:
        '200':
          description: Comparison completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompareStrategiesResponse'
        '400':
          description: Invalid comparison parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================================================
  # FEEDS
  # ============================================================================
  /upp/v1/feeds/status:
    get:
      operationId: getFeedStatus
      summary: Get feed status
      description: Get the current status of all configured data feeds
      tags: [Feeds]
      responses:
        '200':
          description: Feed status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedStatusResponse'

  /upp/v1/feeds/stats:
    get:
      operationId: getFeedStats
      summary: Get feed statistics
      description: Get aggregated statistics for all feeds
      tags: [Feeds]
      responses:
        '200':
          description: Feed statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedStatsResponse'

  /upp/v1/feeds/subscribe:
    post:
      operationId: subscribeFeed
      summary: Subscribe to feeds
      description: Subscribe to live feed updates (WebSocket recommended)
      tags: [Feeds]
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedSubscriptionRequest'
      responses:
        '200':
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedSubscriptionResponse'
        '400':
          description: Invalid subscription parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================================================
  # INGESTION
  # ============================================================================
  /upp/v1/ingestion/stats:
    get:
      operationId: getIngestionStats
      summary: Get ingestion statistics
      description: Get statistics about historical data ingestion
      tags: [Ingestion]
      responses:
        '200':
          description: Ingestion statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_ingested:
                    type: integer
                  last_ingestion:
                    type: string
                    format: date-time

  /upp/v1/ingestion/ingest:
    post:
      operationId: ingestMarket
      summary: Ingest market data
      description: Ingest historical data for a specific market
      tags: [Ingestion]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                market_id:
                  type: string
                from:
                  type: string
                  format: date-time
                to:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Ingestion started
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id:
                    type: string

  /upp/v1/ingestion/ingest-recent:
    post:
      operationId: ingestRecent
      summary: Ingest recent data
      description: Ingest recent historical data for all markets
      tags: [Ingestion]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                hours:
                  type: integer
                  description: Number of hours of recent data to ingest
      responses:
        '200':
          description: Ingestion started
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id:
                    type: string

  # ============================================================================
  # MCP (MODEL CONTEXT PROTOCOL)
  # ============================================================================
  /upp/v1/mcp/tools:
    get:
      operationId: listMcpTools
      summary: List MCP tools
      description: List all available Model Context Protocol tools
      tags: [MCP]
      responses:
        '200':
          description: Available MCP tools
          content:
            application/json:
              schema:
                type: object
                properties:
                  tools:
                    type: array
                    items:
                      type: object

  /upp/v1/mcp/execute:
    post:
      operationId: executeMcpTool
      summary: Execute MCP tool
      description: Execute a Model Context Protocol tool
      tags: [MCP]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tool_name:
                  type: string
                arguments:
                  type: object
      responses:
        '200':
          description: Tool executed successfully
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Invalid tool or arguments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /upp/v1/mcp/schema:
    get:
      operationId: getMcpSchema
      summary: Get MCP schema
      description: Get the schema for MCP integration
      tags: [MCP]
      responses:
        '200':
          description: MCP schema
          content:
            application/json:
              schema:
                type: object

  /.well-known/agent.json:
    get:
      operationId: getAgentCard
      summary: Get agent card
      description: Get the agent card for MCP compatibility
      tags: [MCP]
      responses:
        '200':
          description: Agent card
          content:
            application/json:
              schema:
                type: object

  # ============================================================================
  # ORDERS (PROTECTED)
  # ============================================================================
  /upp/v1/orders:
    get:
      operationId: listOrders
      summary: List orders
      description: Get list of all orders for the authenticated user
      tags: [Orders]
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          description: Filter by order status
          schema:
            type: string
