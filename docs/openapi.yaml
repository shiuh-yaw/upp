              schema:
                type: string

components:
  schemas:
    # Status & Health
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          description: Service health status
          example: healthy

    ReadyResponse:
      type: object
      required: [ready]
      properties:
        ready:
          type: boolean
          description: Whether the gateway is ready to serve requests

    MetricsResponse:
      type: object
      properties:
        data:
          type: object
          description: Prometheus metrics

    # Markets
    Market:
      type: object
      required: [id, title, provider, status, outcomes]
      properties:
        id:
          type: string
          description: Unique market identifier
          example: kalshi.com:BTC-2026-Q1
        title:
          type: string
          description: Human-readable market title
        description:
          type: string
          nullable: true
          description: Detailed market description
        provider:
          type: string
          description: Provider that hosts this market
        status:
          type: string
          description: Current market status
          enum: [open, closed, expired, disputed]
        category:
          type: string
          nullable: true
          description: Market category
        outcomes:
          type: array
          items:
            $ref: '#/components/schemas/MarketOutcome'
        volume:
          type: number
          format: double
          nullable: true
          description: Total trading volume
        volume_24h:
          type: number
          format: double
          nullable: true
          description: Trading volume in last 24 hours
        created_at:
          type: string
          nullable: true
          format: date-time
        closes_at:
          type: string
          nullable: true
          format: date-time

    MarketOutcome:
      type: object
      required: [id, title]
      properties:
        id:
          type: string
          description: Unique outcome identifier
        title:
          type: string
          description: Human-readable outcome title
        price:
          type: number
          format: double
          nullable: true
          description: Current price

    Pagination:
      type: object
      required: [limit]
      properties:
        limit:
          type: integer
          description: Maximum results per page
        cursor:
          type: string
          nullable: true
          description: Pagination cursor for next page

    MarketsResponse:
      type: object
      required: [markets]
      properties:
        markets:
          type: array
          items:
            $ref: '#/components/schemas/Market'
        pagination:
          $ref: '#/components/schemas/Pagination'
          nullable: true

    MarketResponse:
      type: object
      required: [market]
      properties:
        market:
          $ref: '#/components/schemas/Market'

    SearchResponse:
      type: object
      required: [results, total]
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/Market'
        total:
          type: integer
          description: Total number of matches

    # Orderbook
    OrderbookLevel:
      type: object
      required: [price, size]
      properties:
        price:
          type: number
          format: double
        size:
          type: number
          format: double
        count:
          type: integer
          nullable: true

    OrderbookResponse:
      type: object
      required: [market_id, bids, asks, timestamp]
      properties:
        market_id:
          type: string
        bids:
          type: array
          items:
            $ref: '#/components/schemas/OrderbookLevel'
        asks:
          type: array
          items:
            $ref: '#/components/schemas/OrderbookLevel'
        timestamp:
          type: string
          format: date-time

    # Arbitrage
    ArbitrageOpportunity:
      type: object
      required: [id, market_id, exchange_a, exchange_b, profit_percentage, profit_amount, volume_available]
      properties:
        id:
          type: string
        market_id:
          type: string
        exchange_a:
          type: string
        exchange_b:
          type: string
        profit_percentage:
          type: number
          format: double
        profit_amount:
          type: number
          format: double
        volume_available:
          type: number
          format: double

    ArbitrageListResponse:
      type: object
      required: [opportunities]
      properties:
        opportunities:
          type: array
          items:
            $ref: '#/components/schemas/ArbitrageOpportunity'

    ArbitrageSummaryResponse:
      type: object
      required: [total_opportunities, total_profit_24h]
      properties:
        total_opportunities:
          type: integer
        total_profit_24h:
          type: number
          format: double
        best_opportunity:
          $ref: '#/components/schemas/ArbitrageOpportunity'
          nullable: true

    ArbitrageHistoryEntry:
      type: object
      required: [id, market_id, profit, timestamp]
      properties:
        id:
          type: string
        market_id:
          type: string
        profit:
          type: number
          format: double
        timestamp:
          type: string
          format: date-time

    ArbitrageHistoryResponse:
      type: object
      required: [entries]
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/ArbitrageHistoryEntry'

    # Candles
    Candle:
      type: object
      required: [timestamp, open, high, low, close, volume]
      properties:
        timestamp:
          type: string
          format: date-time
        open:
          type: number
          format: double
        high:
          type: number
          format: double
        low:
          type: number
          format: double
        close:
          type: number
          format: double
        volume:
          type: number
          format: double

    CandlesResponse:
      type: object
      required: [market_id, outcome_id, resolution, candles]
      properties:
        market_id:
          type: string
        outcome_id:
          type: string
        resolution:
          type: string
        candles:
          type: array
          items:
            $ref: '#/components/schemas/Candle'

    LatestCandleResponse:
      type: object
      required: [market_id, outcome_id, resolution, candle]
      properties:
        market_id:
          type: string
        outcome_id:
          type: string
        resolution:
          type: string
        candle:
          $ref: '#/components/schemas/Candle'

    # Price Index
    PriceIndexStatsResponse:
      type: object
      required: [index_id, price, change_24h, change_percent_24h, high_24h, low_24h, volume_24h]
      properties:
        index_id:
          type: string
        price:
          type: number
          format: double
        change_24h:
          type: number
          format: double
        change_percent_24h:
          type: number
          format: double
        high_24h:
          type: number
          format: double
        low_24h:
          type: number
          format: double
        volume_24h:
          type: number
          format: double

    # Backtest
    Strategy:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        parameters:
          type: object
          nullable: true

    StrategiesResponse:
      type: object
      required: [strategies]
      properties:
        strategies:
          type: array
          items:
            $ref: '#/components/schemas/Strategy'

    RunBacktestRequest:
      type: object
      required: [strategy, market_id, outcome_id, resolution, initial_capital, fee_rate, slippage_rate]
      properties:
        strategy:
          type: string
        market_id:
          type: string
        outcome_id:
          type: string
        resolution:
          type: string
        params:
          type: object
          nullable: true
        initial_capital:
          type: number
          format: double
        fee_rate:
          type: number
          format: double
        slippage_rate:
          type: number
          format: double
        max_position:
          type: number
          format: double
          nullable: true

    BacktestResponse:
      type: object
      required: [strategy_id, market_id, total_return, sharpe_ratio, max_drawdown, win_rate, trades, pnl]
      properties:
        strategy_id:
          type: string
        market_id:
          type: string
        total_return:
          type: number
          format: double
        sharpe_ratio:
          type: number
          format: double
        max_drawdown:
          type: number
          format: double
        win_rate:
          type: number
          format: double
        trades:
          type: integer
        pnl:
          type: number
          format: double

    CompareStrategiesRequest:
      type: object
      required: [market_id, outcome_id, resolution, strategies]
      properties:
        market_id:
          type: string
        outcome_id:
          type: string
        resolution:
          type: string
        strategies:
          type: array
          items:
            type: string

    CompareStrategiesResponse:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/BacktestResponse'

    # Feeds
    FeedInfo:
      type: object
      required: [id, name, status]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [connected, disconnected, error]
        latency_ms:
          type: number
          format: double
          nullable: true
        last_update:
          type: string
          format: date-time
          nullable: true

    FeedStatusResponse:
      type: object
      required: [feeds]
      properties:
        feeds:
          type: array
          items:
            $ref: '#/components/schemas/FeedInfo'

    FeedStatsResponse:
      type: object
      required: [total_feeds, active_feeds, total_messages, uptime_percent]
      properties:
        total_feeds:
          type: integer
        active_feeds:
          type: integer
        total_messages:
          type: integer
          format: int64
        uptime_percent:
          type: number
          format: double

    FeedSubscriptionRequest:
      type: object
      required: [feed_ids]
      properties:
        feed_ids:
          type: array
          items:
            type: string
        market_ids:
          type: array
          nullable: true
          items:
            type: string

    FeedSubscriptionResponse:
      type: object
      required: [subscription_id, feeds, status]
      properties:
        subscription_id:
          type: string
        feeds:
          type: array
          items:
            type: string
        status:
          type: string

    # Orders
    OrderSide:
      type: string
      enum: [BUY, SELL]

    OrderType:
      type: string
      enum: [LIMIT, MARKET]

    Order:
      type: object
      required: [id, market_id, outcome_id, side, quantity, filled, price, order_type, status, created_at, updated_at]
      properties:
        id:
          type: string
        market_id:
          type: string
        outcome_id:
          type: string
        side:
          $ref: '#/components/schemas/OrderSide'
        quantity:
          type: number
          format: double
        filled:
          type: number
          format: double
        price:
          type: number
          format: double
        order_type:
          $ref: '#/components/schemas/OrderType'
        status:
          type: string
          enum: [open, partially_filled, filled, cancelled, rejected]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    OrderResponse:
      type: object
      required: [order]
      properties:
        order:
          $ref: '#/components/schemas/Order'

    OrdersResponse:
      type: object
      required: [orders]
      properties:
        orders:
          type: array
          items:
            $ref: '#/components/schemas/Order'
        pagination:
          $ref: '#/components/schemas/Pagination'
          nullable: true

    CreateOrderRequest:
      type: object
      required: [market_id, outcome_id, side, quantity, price, order_type]
      properties:
        market_id:
          type: string
        outcome_id:
          type: string
        side:
          $ref: '#/components/schemas/OrderSide'
