# Prometheus recording rules for UPP Gateway
# These pre-compute commonly used metric aggregations

groups:
  - name: upp_gateway
    interval: 10s
    rules:
      # Request rate per endpoint
      - record: upp:requests:rate1m
        expr: rate(requests_total[1m])

      # Success rate per endpoint
      - record: upp:requests:success_rate
        expr: (rate(requests_total{status=~"2.."}[1m]) / rate(requests_total[1m])) * 100

      # Error rate per endpoint
      - record: upp:requests:error_rate
        expr: (rate(requests_total{status=~"5.."}[1m]) / rate(requests_total[1m])) * 100

      # 99th percentile latency per path
      - record: upp:latency:p99
        expr: histogram_quantile(0.99, request_duration_seconds)

      # 95th percentile latency per path
      - record: upp:latency:p95
        expr: histogram_quantile(0.95, request_duration_seconds)

      # 50th percentile latency per path
      - record: upp:latency:p50
        expr: histogram_quantile(0.50, request_duration_seconds)

      # WebSocket message rate
      - record: upp:ws:messages:rate1m
        expr: rate(ws_messages_total[1m])

      # Provider request rate
      - record: upp:provider:requests:rate1m
        expr: rate(provider_requests_total[1m])

      # Average request duration per endpoint
      - record: upp:request:avg_duration
        expr: rate(request_duration_seconds_sum[1m]) / rate(request_duration_seconds_count[1m])

      # Cache hit ratio (placeholder - would need cache metrics)
      - record: upp:cache:hit_ratio
        expr: (cache_hits / (cache_hits + cache_misses)) * 100

  - name: alerts
    interval: 10s
    rules:
      # High error rate alert
      - alert: HighErrorRate
        expr: upp:requests:error_rate > 5
        for: 1m
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }}% on {{ $labels.path }}"

      # Slow response time alert
      - alert: SlowResponseTime
        expr: upp:latency:p99 > 1
        for: 2m
        annotations:
          summary: "Slow response time detected"
          description: "P99 latency is {{ $value }}s on {{ $labels.path }}"

      # WebSocket connection spike alert
      - alert: WebSocketConnectionSpike
        expr: rate(active_ws_connections[5m]) > 10
        for: 1m
        annotations:
          summary: "WebSocket connection spike"
          description: "New connections rate is {{ $value }} conn/s"

      # Provider unavailability alert
      - alert: ProviderUnavailable
        expr: connected_providers == 0
        for: 2m
        annotations:
          summary: "No providers connected"
          description: "Gateway has no connected providers"
