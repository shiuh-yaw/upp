# UPP — Local Development Stack
#
# Quick start:
#   docker compose up -d redis    # Redis only (run gateway natively)
#   docker compose up              # everything
#   docker compose --profile monitoring up  # + Prometheus & Grafana
#
# For fastest iteration:
#   docker compose up -d redis
#   cd gateway && cargo run

services:
  # ── Redis — shared state, pub/sub, rate limiting ──────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server
        --appendonly yes
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── UPP Gateway ───────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - UPP_HOST=0.0.0.0
      - UPP_PORT=8080
      - UPP_REDIS_URL=redis://redis:6379
      - UPP_LOG_LEVEL=info
      - UPP_CACHE_TTL_SECS=30
      - RUST_LOG=upp_gateway=info,tower_http=debug
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Mock Server (for trading/portfolio testing) ───────────
  mock-server:
    image: python:3.12-slim
    ports:
      - "8081:8081"
    volumes:
      - ./tools:/app
    working_dir: /app
    command: python mock_server.py
    profiles:
      - mock
    restart: unless-stopped

  # ── Prometheus (metrics collection) ───────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
    profiles:
      - monitoring

  # ── Grafana (dashboards) ──────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    profiles:
      - monitoring

volumes:
  redis-data:
